<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de contatos - Sistema BoaParte">
    <title>Lista de Contatos</title>
    <link rel="icon" type="image/png" href="images/image.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/users.css">
</head>
<body>
    <header>
        <div class="top-left-image" aria-label="Logo BoaParte">
            <img src="images/image2.png" alt="Logo BoaParte">
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h1>Lista de Contatos</h1>
            
            <!-- Month filter -->
            <div class="filter-container">
                <select id="month-filter" class="month-filter" aria-label="Filtrar contatos por mês">
                    <option value="todos">Todos os meses</option>
                </select>
            </div>

            <!-- Loading indicator -->
            <div id="loading-indicator" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Carregando contatos...</p>
            </div>

            <!-- Error message container -->
            <div id="error-message" class="error-message hidden" role="alert"></div>

            <!-- Contacts list container -->
            <section id="contacts-section">
                <ul id="contatos-lista" class="contacts-list" aria-label="Lista de contatos"></ul>
            </section>

            <!-- Action buttons -->
            <div class="button-container">
                <a href="dashboard.html" class="back-btn button" role="button">
                    <i class="fas fa-arrow-left"></i> Voltar para o Dashboard
                </a>
                <button onclick="logout()" class="logout-btn button" role="button">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>
    </main>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Scripts -->
    <script src="js/users.js"></script>
</body>
</html>
